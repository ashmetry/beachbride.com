name = "beachbride-workers"
main = "workers/form-handler.ts"
compatibility_date = "2024-01-01"

# Routes are registered once in Cloudflare dashboard / first deploy.
# Do NOT re-declare here — wrangler errors with code 10020 on every
# subsequent deploy because the route already exists.
# Active routes: beachbride.com/workers/form, beachbride.com/workers/contact

# Worker secrets — set via: wrangler secret put <NAME>
# Or in Cloudflare dashboard → Workers → beachbride-workers → Settings → Variables
#
# MAILGUN_API_KEY
# MAILGUN_DOMAIN
# SENDY_URL
# SENDY_API_KEY
# SENDY_LIST_ID
# SENDY_NURTURE_LIST_ID
